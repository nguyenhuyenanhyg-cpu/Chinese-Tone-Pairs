<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語聲調大挑戰 - Puppy Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        :root {
            --primary: #FF8F9C;     /* Hồng pastel đậm */
            --primary-dark: #E07884;
            --secondary: #6CB4EE;   /* Xanh dương pastel */
            --secondary-dark: #5A99C9;
            --correct: #8ED081;     /* Xanh lá pastel */
            --correct-dark: #76AE6B;
            --wrong: #FF6B6B;       /* Đỏ pastel */
            --bg-color: #FFF9F0;    /* Vàng kem nền */
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A;
        }
        
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFE4E1 15%, transparent 16%), radial-gradient(#FFE4E1 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        /* Bố cục Game chính */
        .game-wrapper {
            display: flex; gap: 20px; max-width: 900px; width: 100%; flex-direction: row;
        }
        @media (max-width: 768px) {
            .game-wrapper { flex-direction: column; }
        }

        /* Các khối Panel (Thẻ Card) */
        .panel {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.05), 0 15px 30px rgba(0,0,0,0.05);
            padding: 30px; flex: 1; text-align: center;
            border: 3px solid #FFF0F5;
        }

        /* Chuyển cảnh mượt mà */
        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tiêu đề Game */
        h1 { color: var(--primary); margin-bottom: 5px; font-size: 2.2em; font-weight: 800; }
        p.subtitle { color: #888; margin-bottom: 25px; font-size: 1.1em; font-weight: 700;}

        /* Nút bấm Game 3D */
        .btn {
            background-color: var(--primary); color: white; border: none;
            padding: 16px 20px; border-radius: 16px; font-size: 1.2em; font-weight: 800;
            cursor: pointer; width: 100%; margin-bottom: 15px;
            box-shadow: 0 6px 0 var(--primary-dark); transition: all 0.1s;
        }
        .btn:hover { filter: brightness(1.05); }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--primary-dark); }
        .btn.level2 { background-color: var(--secondary); box-shadow: 0 6px 0 var(--secondary-dark); }
        .btn.level2:active { box-shadow: 0 0 0 var(--secondary-dark); }
        .btn-secondary { background-color: #D3D3D3; box-shadow: 0 6px 0 #B0B0B0; color: #555;}
        .btn-secondary:active { box-shadow: 0 0 0 #B0B0B0; }

        /* Khung hiển thị Ảnh từ vựng */
        .vocab-image-container {
            width: 100%; height: 220px; background-color: #F8F9FA;
            border-radius: 16px; margin-bottom: 20px; border: 4px solid #F1F3F5;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            position: relative;
        }
        .vocab-image { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { color: #adb5bd; font-weight: 700; }

        /* Lưới lựa chọn Pinyin */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .option-btn {
            background-color: white; border: 3px solid #E9ECEF; padding: 15px 5px;
            font-size: 1.3em; font-weight: 700; border-radius: 16px; cursor: pointer; 
            color: var(--text-main); transition: all 0.1s; box-shadow: 0 4px 0 #E9ECEF;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--secondary); color: var(--secondary); }
        .option-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #E9ECEF; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.5; box-shadow: none; transform: translateY(4px); }
        
        .option-btn.correct { background-color: var(--correct); border-color: var(--correct-dark); color: white; box-shadow: 0 4px 0 var(--correct-dark); opacity: 1;}
        .option-btn.wrong { background-color: var(--wrong); border-color: #D9534F; color: white; box-shadow: 0 4px 0 #D9534F; animation: shake 0.4s; }

        /* Đáp án dàn hàng ngang */
        .answer-reveal {
            display: none; background-color: #FFF3CD; border: 3px dashed #FFD700;
            padding: 15px 20px; border-radius: 16px; margin-bottom: 20px;
            align-items: center; justify-content: space-between; text-align: left;
        }
        .answer-reveal.active { display: flex; animation: fadeIn 0.3s; }
        .reveal-char { font-size: 3.5em; color: #D4A017; margin: 0; line-height: 1; font-family: 'Kaiti', 'STKaiti', 'BiauKai', serif; }
        .reveal-pinyin { font-size: 1.3em; color: #D4A017; font-weight: 800; text-align: center; }
        .reveal-tone-note { font-size: 0.8em; color: #B8860B; display: block; font-weight: 700; }
        .reveal-meaning { font-size: 1.2em; color: #8B6508; font-weight: 700; text-align: right; }

        .nav-buttons { display: flex; gap: 15px; }
        .nav-buttons .btn { margin-bottom: 0; }

        /* --- CỬA SỔ CHÚ CÚN (PET PANEL) --- */
        .pet-panel {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pet-image-container {
            width: 240px; height: 240px; background-color: white;
            border-radius: 50%; border: 6px solid #FFE4E1; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .pet-image { width: 100%; height: 100%; object-fit: cover; }
        
        .pet-status { margin-top: 20px; font-weight: 800; color: var(--primary); font-size: 1.3em; min-height: 1.2em;}
        .streak-counter { color: #FFA07A; font-size: 1.4em; font-weight: 800; margin-top: 5px;}

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; color: #A0A0A0; font-weight: 800; font-size: 1.1em;}
        .level-badge { background-color: #F1F3F5; padding: 6px 15px; border-radius: 20px; color: var(--secondary-dark); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>

<div class="game-wrapper screen active" id="home-screen">
    <div class="panel" style="max-width: 500px; margin: 0 auto; padding: 50px 30px;">
        <div style="font-size: 4em; margin-bottom: 10px;">🐶</div>
        <h1>華語聲調大挑戰</h1>
        <p class="subtitle">Hãy nghe và chọn đúng để nuôi cún nhé!</p>
        <button class="btn" onclick="startGame(1)">Level 1: 單音節</button>
        <button class="btn level2" onclick="startGame(2)">Level 2: 雙音節與變調</button>
    </div>
</div>

<div class="game-wrapper screen" id="game-screen">
    <div class="panel">
        <div class="top-bar">
            <span class="level-badge" id="level-display">Level 1</span>
            <span id="progress-text">1 / 10</span>
        </div>
        
        <div class="vocab-image-container">
            <img id="vocab-img" class="vocab-image" src="" alt="Vocabulary" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="placeholder-text" style="display:none;">[Hình ảnh: <span id="img-filename"></span>]</span>
        </div>
        
        <button class="btn" style="background-color: var(--correct); box-shadow: 0 6px 0 var(--correct-dark);" onclick="playSound()">🔊 聽發音 / Nghe lại</button>
        
        <div class="options-grid" id="options-container"></div>
        
        <div class="answer-reveal" id="answer-reveal">
            <div class="reveal-char" id="reveal-char">大</div>
            <div class="reveal-pinyin">
                <span id="reveal-pinyin-text">dà</span>
                <span class="reveal-tone-note" id="reveal-tone-note">(Tone 4)</span>
            </div>
            <div class="reveal-meaning" id="reveal-meaning">big</div>
        </div>
        
        <div class="nav-buttons">
            <button class="btn btn-secondary" onclick="location.reload()">Bỏ cuộc</button>
            <button class="btn" id="next-btn" style="display:none;" onclick="nextQuestion()">下一題 ➔</button>
        </div>
    </div>

    <div class="panel pet-panel">
        <div class="pet-image-container">
            <img id="pet-img" class="pet-image" src="assets/dog_idle.gif" alt="Puppy" onerror="this.src='https://via.placeholder.com/250/FFE4E1/FF8F9C?text=Pet+GIF+Missing'">
        </div>
        <div class="pet-status" id="pet-status">Cún đang đợi bạn...</div>
        <div class="streak-counter" id="streak-counter">🔥 Liên kích: 0</div>
    </div>
</div>

<div class="game-wrapper screen" id="end-screen">
    <div class="panel" style="max-width: 500px; margin: 0 auto; padding: 50px 30px;">
        <div style="font-size: 4em; margin-bottom: 10px;">🏆</div>
        <h1>Hoàn thành xuất sắc!</h1>
        <p class="subtitle">Cún con rất no bụng và hạnh phúc.</p>
        <button class="btn" onclick="location.reload()">Chơi lại từ đầu ↺</button>
    </div>
</div>

<script>
    // 📚 TỪ ĐIỂN DỮ LIỆU (Đã thêm 5 từ vựng mới của bạn)
    const level1Data = [
        { ch: "大", meaning: "big", pinyin: "dà", tones: ["dā", "dá", "dǎ", "dà"], correct: 3, toneNote: "Tone 4", imgFile: "da.jpg" },
        { ch: "小", meaning: "small", pinyin: "xiǎo", tones: ["xiāo", "xiáo", "xiǎo", "xiào"], correct: 2, toneNote: "Tone 3", imgFile: "xiao.jpg" },
        { ch: "好", meaning: "good", pinyin: "hǎo", tones: ["hāo", "háo", "hǎo", "hào"], correct: 2, toneNote: "Tone 3", imgFile: "hao.jpg" },
        { ch: "新", meaning: "new", pinyin: "xīn", tones: ["xīn", "xín", "xǐn", "xìn"], correct: 0, toneNote: "Tone 1", imgFile: "xin.jpg" },
        { ch: "忙", meaning: "busy", pinyin: "máng", tones: ["māng", "máng", "mǎng", "màng"], correct: 1, toneNote: "Tone 2", imgFile: "mang.jpg" },
        { ch: "紅", meaning: "red", pinyin: "hóng", tones: ["hōng", "hóng", "hǒng", "hòng"], correct: 1, toneNote: "Tone 2", imgFile: "hong.jpg" },
        { ch: "黑", meaning: "black", pinyin: "hēi", tones: ["hēi", "héi", "hěi", "hèi"], correct: 0, toneNote: "Tone 1", imgFile: "hei.jpg" },
        { ch: "冷", meaning: "cold", pinyin: "lěng", tones: ["lēng", "léng", "lěng", "lèng"], correct: 2, toneNote: "Tone 3", imgFile: "leng.jpg" },
        { ch: "熱", meaning: "hot", pinyin: "rè", tones: ["rē", "ré", "rě", "rè"], correct: 3, toneNote: "Tone 4", imgFile: "re.jpg" },
        { ch: "酸", meaning: "sour", pinyin: "suān", tones: ["suān", "suán", "suǎn", "suàn"], correct: 0, toneNote: "Tone 1", imgFile: "suan.jpg" },
        { ch: "貴", meaning: "expensive", pinyin: "guì", tones: ["guī", "guí", "guǐ", "guì"], correct: 3, toneNote: "Tone 4", imgFile: "gui.jpg" }
    ];

    const level2Data = [
        { ch: "高興", meaning: "happy", pinyin: "gāo xìng", tones: ["gāo xīng", "gāo xíng", "gāo xǐng", "gāo xìng"], correct: 3, toneNote: "Tone 1 + 4", imgFile: "gaoxing.jpg" },
        { ch: "便宜", meaning: "cheap", pinyin: "pián yí", tones: ["piān yí", "pián yí", "piǎn yí", "piàn yí"], correct: 1, toneNote: "Tone 2 + 2", imgFile: "pianyi.jpg" },
        { ch: "很好", meaning: "very good", pinyin: "hěn hǎo", tones: ["hěn hǎo", "hén hǎo", "hèn hǎo", "hēn hǎo"], correct: 0, toneNote: "Tone 3 + 3 -> Sandhi", imgFile: "henhao.jpg" },
        { ch: "不錯", meaning: "not bad", pinyin: "bú cuò", tones: ["bù cuò", "bú cuò", "bǔ cuò", "bū cuò"], correct: 1, toneNote: "Tone 4 -> Sandhi + 4", imgFile: "bucuo.jpg" },
        { ch: "好看", meaning: "good-looking", pinyin: "hǎo kàn", tones: ["hāo kàn", "háo kàn", "hǎo kàn", "hào kàn"], correct: 2, toneNote: "Tone 3 + 4", imgFile: "haokan.jpg" },
        { ch: "漂亮", meaning: "pretty", pinyin: "piào liàng", tones: ["piāo liàng", "piáo liàng", "piǎo liàng", "piào liàng"], correct: 3, toneNote: "Tone 4 + 4", imgFile: "piaoliang.jpg" },
        // 5 TỪ MỚI THÊM VÀO
        { ch: "難聽", meaning: "awful (to hear)", pinyin: "nán tīng", tones: ["nān tīng", "nán tīng", "nǎn tīng", "nàn tīng"], correct: 1, toneNote: "Tone 2 + 1", imgFile: "nanting.jpg" },
        { ch: "突然", meaning: "sudden", pinyin: "tú rán", tones: ["tū rán", "tú rán", "tǔ rán", "tù rán"], correct: 1, toneNote: "Tone 2 + 2", imgFile: "turan.jpg" },
        { ch: "無聊", meaning: "boring", pinyin: "wú liáo", tones: ["wū liáo", "wú liáo", "wǔ liáo", "wù liáo"], correct: 1, toneNote: "Tone 2 + 2", imgFile: "wuliao.jpg" },
        { ch: "危險", meaning: "dangerous", pinyin: "wēi xiǎn", tones: ["wēi xiǎn", "wéi xiǎn", "wěi xiǎn", "wèi xiǎn"], correct: 0, toneNote: "Tone 1 + 3", imgFile: "weixian.jpg" },
        { ch: "糟糕", meaning: "terrible", pinyin: "zāo gāo", tones: ["zāo gāo", "záo gāo", "zǎo gāo", "zào gāo"], correct: 0, toneNote: "Tone 1 + 1", imgFile: "zaogao.jpg" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let wrongAttempts = 0; 
    let streak = 0;
    let isLocked = false;

    // Quản lý chuyển đổi màn hình (Screen transition)
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(level) {
        switchScreen('game-screen');
        currentQuestions = level === 1 ? [...level1Data] : [...level2Data];
        currentQuestions.sort(() => Math.random() - 0.5); // Randomize
        currentIndex = 0;
        streak = 0;
        document.getElementById('level-display').innerText = level === 1 ? "Level 1: 單音節" : "Level 2: 雙音節";
        loadQuestion();
    }

    function loadQuestion() {
        isLocked = false;
        wrongAttempts = 0;
        const q = currentQuestions[currentIndex];
        
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('answer-reveal').classList.remove('active');
        document.getElementById('next-btn').style.display = "none";
        
        // Tải Ảnh
        const vocabImg = document.getElementById('vocab-img');
        vocabImg.src = `assets/${q.imgFile}`;
        vocabImg.style.display = 'block';
        document.getElementById('img-filename').innerText = q.imgFile;

        // Reset Pet
        updatePetState('idle');

        // Render nút chọn
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";
        q.tones.forEach((pinyin, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = pinyin;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });

        playSound();
    }

    function playSound() {
        const q = currentQuestions[currentIndex];
        let utterance = new SpeechSynthesisUtterance(q.ch);
        utterance.lang = "zh-TW";
        utterance.rate = 0.85; 
        speechSynthesis.speak(utterance);
    }

    // Trạng thái Pet NPC
    function updatePetState(state) {
        const petImg = document.getElementById('pet-img');
        const petStatus = document.getElementById('pet-status');
        
        if (state === 'idle') {
            petImg.src = "assets/dog_idle.gif";
            petStatus.innerText = "Cún đang đợi bạn...";
            petStatus.style.color = "var(--text-main)";
        } else if (state === 'happy') {
            petImg.src = "assets/dog_happy.gif";
            petStatus.innerText = "Ngon quá! Cún rất vui!";
            petStatus.style.color = "var(--correct-dark)";
        } else if (state === 'sad') {
            petImg.src = "assets/dog_sad.gif";
            petStatus.innerText = "Sai rồi... cún đói...";
            petStatus.style.color = "var(--secondary-dark)";
        } else if (state === 'cry') {
            petImg.src = "assets/dog_cry.gif";
            petStatus.innerText = "Huhu cún khóc đây!";
            petStatus.style.color = "var(--wrong)";
        }
        document.getElementById('streak-counter').innerText = `🔥 Liên kích: ${streak}`;
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (isLocked) return;
        const q = currentQuestions[currentIndex];
        
        if (selectedIndex === q.correct) {
            btnElement.classList.add('correct');
            streak++;
            isLocked = true;
            updatePetState('happy');
            showAnswerReveal(q);
        } else {
            wrongAttempts++;
            streak = 0;
            btnElement.classList.add('wrong');
            
            // Xóa class wrong để nút có thể rung lại nếu bấm sai tiếp
            setTimeout(() => { btnElement.classList.remove('wrong'); }, 400); 
            btnElement.disabled = true;

            if (wrongAttempts === 1) {
                updatePetState('sad');
            } else if (wrongAttempts >= 2) {
                // Khóa sau 2 lần sai
                isLocked = true;
                updatePetState('cry');
                
                // Highlight đáp án đúng
                const buttons = document.querySelectorAll('.option-btn');
                buttons[q.correct].classList.add('correct');
                
                showAnswerReveal(q);
            }
        }
    }

    function showAnswerReveal(q) {
        document.getElementById('reveal-char').innerText = q.ch;
        document.getElementById('reveal-pinyin-text').innerText = q.pinyin;
        document.getElementById('reveal-tone-note').innerText = `(${q.toneNote})`;
        document.getElementById('reveal-meaning').innerText = q.meaning;
        
        document.getElementById('answer-reveal').classList.add('active');
        document.getElementById('next-btn').style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            switchScreen('end-screen');
        }
    }
</script>

</body>
</html>
