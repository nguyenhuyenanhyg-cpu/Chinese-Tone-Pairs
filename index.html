<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語聲調練習 - 完整版</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #FFB347;
            --correct-color: #28a745;
            --wrong-color: #dc3545;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
        }
        
        /* 首頁選單樣式 */
        #home-screen h1 { color: var(--primary-color); margin-bottom: 10px; }
        #home-screen p { color: #666; margin-bottom: 30px; }
        .level-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }
        .level-btn.level2 { background-color: var(--secondary-color); color: #333; font-weight: bold; }
        .level-btn:hover { filter: brightness(0.9); }

        /* 遊戲畫面樣式 */
        #game-screen { display: none; }
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: bold;
        }
        .level-badge {
            background-color: #eee;
            color: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        /* 視覺呈現區域 (Emoji 或 圖片) */
        .visual-container {
            width: 100%;
            height: 200px;
            background-color: #e9ecef;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid #dee2e6;
        }
        .emoji-display {
            font-size: 100px; /* 超大 Emoji */
        }
        .question-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* 預設隱藏，有圖片連結時才顯示 */
        }

        .play-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        .play-btn:hover { background-color: #45a049; }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            padding: 15px 5px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover { background-color: #e2e6ea; }
        .option-btn.correct { background-color: #d4edda; border-color: var(--correct-color); color: #155724; }
        .option-btn.wrong { background-color: #f8d7da; border-color: var(--wrong-color); color: #721c24; animation: shake 0.4s; }
        
        .answer-reveal {
            display: none;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .answer-reveal h3 { margin: 0 0 5px 0; font-size: 1.8em; color: #856404; }
        .answer-reveal p { margin: 0; color: #856404; }
        
        .action-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        #next-btn { background-color: var(--primary-color); display: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>

<div class="container" id="home-screen">
    <h1>華語聲調大挑戰</h1>
    <p>請選擇你要挑戰的關卡：</p>
    <button class="level-btn" onclick="startGame(1)">Level 1: 單音節形容詞</button>
    <button class="level-btn level2" onclick="startGame(2)">Level 2: 雙音節與變調</button>
</div>

<div class="container" id="game-screen">
    <div class="header-info">
        <span class="level-badge" id="level-display">Level 1</span>
        <span id="progress-text">1 / 5</span>
    </div>
    
    <div class="visual-container">
        <div id="emoji-display" class="emoji-display">🐘</div>
        <img id="question-image" class="question-image" src="" alt="Question Image">
    </div>
    
    <button class="play-btn" onclick="playSound()">🔊 聽發音</button>
    
    <div class="options-grid" id="options-container"></div>
    
    <div class="answer-reveal" id="answer-reveal">
        <h3 id="reveal-char">大</h3>
        <p id="reveal-meaning">big (第四聲)</p>
    </div>
    
    <button class="action-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
    <button class="action-btn" style="background-color: #ccc; color: #333;" onclick="location.reload()">回首頁</button>
</div>

<script>
    /* 題庫設計：
       emoji: 預設顯示的相關圖示
       imgSrc: 如果你有自己生成的圖片，把路徑寫在這裡 (例如: "images/da.jpg")。
               只要這裡有填寫網址或路徑，系統就會自動隱藏 emoji 並顯示你的圖片。
    */
    const level1Data = [
        { ch: "大", meaning: "big (第四聲 dà)", tones: ["dā", "dá", "dǎ", "dà"], correctIndex: 3, emoji: "🐘", imgSrc: "" },
        { ch: "好", meaning: "good (第三聲 hǎo)", tones: ["hāo", "háo", "hǎo", "hào"], correctIndex: 2, emoji: "👍", imgSrc: "" },
        { ch: "新", meaning: "new (第一聲 xīn)", tones: ["xīn", "xín", "xǐn", "xìn"], correctIndex: 0, emoji: "🎁", imgSrc: "" },
        { ch: "忙", meaning: "busy (第二聲 máng)", tones: ["māng", "máng", "mǎng", "màng"], correctIndex: 1, emoji: "🏃‍♂️", imgSrc: "" },
        { ch: "紅", meaning: "red (第二聲 hóng)", tones: ["hōng", "hóng", "hǒng", "hòng"], correctIndex: 1, emoji: "🍎", imgSrc: "" }
    ];

    const level2Data = [
        { ch: "高興", meaning: "happy (gāo xìng)", tones: ["gāo xīng", "gāo xíng", "gāo xǐng", "gāo xìng"], correctIndex: 3, emoji: "😄", imgSrc: "" },
        { ch: "便宜", meaning: "cheap (pián yi)", tones: ["piān yi", "pián yi", "piǎn yi", "piàn yi"], correctIndex: 1, emoji: "🏷️", imgSrc: "" },
        { ch: "很好", meaning: "very good (第三聲變調 hén hǎo)", tones: ["hěn hǎo", "hén hǎo", "hèn hǎo", "hēn hǎo"], correctIndex: 1, emoji: "🌟", imgSrc: "" },
        { ch: "不錯", meaning: "not bad (「不」變調 bú cuò)", tones: ["bù cuò", "bú cuò", "bǔ cuò", "bū cuò"], correctIndex: 1, emoji: "👌", imgSrc: "" },
        { ch: "好看", meaning: "good-looking (hǎo kàn)", tones: ["hāo kàn", "háo kàn", "hǎo kàn", "hào kàn"], correctIndex: 2, emoji: "👗", imgSrc: "" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let isAnswered = false;

    function startGame(level) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        currentQuestions = level === 1 ? level1Data : level2Data;
        currentIndex = 0;
        document.getElementById('level-display').innerText = `Level ${level}`;
        
        loadQuestion();
    }

    function loadQuestion() {
        isAnswered = false;
        const q = currentQuestions[currentIndex];
        
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
        
        // 判斷要顯示圖片還是 Emoji
        const emojiElement = document.getElementById('emoji-display');
        const imgElement = document.getElementById('question-image');
        
        if (q.imgSrc !== "") {
            imgElement.src = q.imgSrc;
            imgElement.style.display = "block";
            emojiElement.style.display = "none";
        } else {
            emojiElement.innerText = q.emoji;
            emojiElement.style.display = "block";
            imgElement.style.display = "none";
        }
        
        document.getElementById('answer-reveal').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";
        
        q.tones.forEach((pinyin, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = pinyin;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function playSound() {
        const q = currentQuestions[currentIndex];
        let utterance = new SpeechSynthesisUtterance(q.ch);
        utterance.lang = "zh-TW";
        utterance.rate = 0.85; 
        speechSynthesis.speak(utterance);
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (isAnswered) return;
        
        const q = currentQuestions[currentIndex];
        
        if (selectedIndex === q.correctIndex) {
            btnElement.classList.add('correct');
            isAnswered = true;
            
            document.getElementById('reveal-char').innerText = q.ch;
            document.getElementById('reveal-meaning').innerText = q.meaning;
            document.getElementById('answer-reveal').style.display = "block";
            document.getElementById('next-btn').style.display = "block";
        } else {
            btnElement.classList.add('wrong');
            setTimeout(() => { btnElement.classList.remove('wrong'); }, 400);
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            document.getElementById('game-screen').innerHTML = `
                <h2 style="color: var(--primary-color);">🎉 恭喜通關！</h2>
                <p>你已經完成這個關卡的所有挑戰。</p>
                <button class="action-btn" style="background-color: var(--primary-color);" onclick="location.reload()">回首頁選關 ↺</button>
            `;
        }
    }
</script>

</body>
</html>
