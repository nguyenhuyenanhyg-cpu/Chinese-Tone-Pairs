<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語聲調 - 基礎測試版</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f9f9f9;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }
        .btn { 
            padding: 15px 20px; 
            font-size: 18px; 
            margin: 10px; 
            cursor: pointer; 
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: white;
        }
        .btn:hover { background-color: #f0f0f0; }
        .play-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            width: 100%;
            margin-bottom: 20px;
        }
        .play-btn:hover { background-color: #45a049; }
        #result { 
            margin-top: 20px; 
            font-size: 20px; 
            font-weight: bold; 
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>華語聲調練習</h2>
        <p style="font-size: 24px;">字彙：<strong>大</strong> (big)</p>

        <button class="btn play-btn" onclick="playSound()">🔊 聽發音</button>

        <hr style="margin: 20px 0;">

        <p>請選擇正確的拼音：</p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="checkAnswer('dā')">dā</button>
            <button class="btn" onclick="checkAnswer('dá')">dá</button>
            <button class="btn" onclick="checkAnswer('dǎ')">dǎ</button>
            <button class="btn" onclick="checkAnswer('dà')">dà</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        // 呼叫瀏覽器內建語音來念出中文字
        function playSound() {
            let utterance = new SpeechSynthesisUtterance("大");
            utterance.lang = "zh-TW";
            speechSynthesis.speak(utterance);
        }

        // 檢查答案邏輯
        function checkAnswer(answer) {
            let resultDiv = document.getElementById("result");
            if (answer === 'dà') {
                resultDiv.style.color = "green";
                resultDiv.innerText = "✅ 答對了！是第四聲 dà";
            } else {
                resultDiv.style.color = "red";
                resultDiv.innerText = "❌ 不對喔，再聽一次試試看！";
            }
        }
    </script>

</body>
</html>
