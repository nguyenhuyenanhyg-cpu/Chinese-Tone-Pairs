<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語聲調練習 - 挑戰版</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #FFB347;
            --correct-color: #28a745;
            --wrong-color: #dc3545;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        /* 首頁選單樣式 */
        #home-screen h1 { color: var(--primary-color); margin-bottom: 10px; }
        #home-screen p { color: #666; margin-bottom: 30px; }
        .level-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: transform 0.1s, background-color 0.2s;
        }
        .level-btn.level2 { background-color: var(--secondary-color); color: #333; font-weight: bold; }
        .level-btn:hover { filter: brightness(0.9); transform: scale(1.02); }

        /* 遊戲畫面樣式 */
        #game-screen { display: none; }
        
        /* 分數與連擊 UI */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.1em;
            font-weight: bold;
        }
        .score-display { color: var(--primary-color); }
        .streak-display { 
            color: #ff6b6b; 
            opacity: 0; 
            transition: opacity 0.3s;
        }
        .streak-display.active { opacity: 1; animation: pop 0.3s ease-out; }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 0.9em;
            color: #666;
        }
        .level-badge {
            background-color: #eee;
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .visual-container {
            width: 100%;
            height: 180px;
            background-color: #e9ecef;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #dee2e6;
            position: relative;
        }
        .emoji-display { font-size: 80px; user-select: none; }
        
        /* 浮動加分動畫 */
        .floating-points {
            position: absolute;
            color: var(--secondary-color);
            font-weight: bold;
            font-size: 1.5em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }

        .play-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #388E3C;
            transition: all 0.1s;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dee2e6;
            padding: 15px 5px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover { background-color: #e2e6ea; }
        .option-btn.correct { background-color: #d4edda; border-color: var(--correct-color); color: #155724; }
        .option-btn.wrong { background-color: #f8d7da; border-color: var(--wrong-color); color: #721c24; animation: shake 0.4s; }
        
        .answer-reveal {
            display: none;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .answer-reveal h3 { margin: 0 0 5px 0; font-size: 1.8em; color: #856404; }
        .answer-reveal p { margin: 0; color: #856404; }
        
        .action-btn {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        #next-btn { background-color: var(--primary-color); display: none; }
        
        /* 結算畫面樣式 */
        .rank-display { font-size: 4em; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .rank-S { color: #FFD700; } /* 金色 */
        .rank-A { color: #C0C0C0; } /* 銀色 */
        .rank-B { color: #CD7F32; } /* 銅色 */
        .rank-C { color: #4A90E2; } /* 藍色 */

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.5); }
        }
    </style>
</head>
<body>

<div class="container" id="home-screen">
    <h1>華語聲調大挑戰</h1>
    <p>戴上耳機，挑戰你的聲調絕對音感！</p>
    <button class="level-btn" onclick="startGame(1)">Level 1: 單音節形容詞</button>
    <button class="level-btn level2" onclick="startGame(2)">Level 2: 雙音節與變調</button>
</div>

<div class="container" id="game-screen">
    <div class="stats-bar">
        <span class="score-display">分數: <span id="score">0</span></span>
        <span class="streak-display" id="streak-indicator">🔥 2 連擊!</span>
    </div>

    <div class="header-info">
        <span class="level-badge" id="level-display">Level 1</span>
        <span id="progress-text">1 / 10</span>
    </div>
    
    <div class="visual-container" id="visual-box">
        <div id="emoji-display" class="emoji-display">🐘</div>
    </div>
    
    <button class="play-btn" onclick="playSound()">🔊 聽發音</button>
    
    <div class="options-grid" id="options-container"></div>
    
    <div class="answer-reveal" id="answer-reveal">
        <h3 id="reveal-char">大</h3>
        <p id="reveal-meaning">big (第四聲)</p>
    </div>
    
    <button class="action-btn" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
    <button class="action-btn" style="background-color: #ccc; color: #333;" onclick="location.reload()">放棄並回首頁</button>
</div>

<script>
    const level1Data = [
        { ch: "大", meaning: "big (第四聲 dà)", tones: ["dā", "dá", "dǎ", "dà"], correctIndex: 3, emoji: "🐘" },
        { ch: "小", meaning: "small (第三聲 xiǎo)", tones: ["xiāo", "xiáo", "xiǎo", "xiào"], correctIndex: 2, emoji: "🐭" },
        { ch: "好", meaning: "good (第三聲 hǎo)", tones: ["hāo", "háo", "hǎo", "hào"], correctIndex: 2, emoji: "👍" },
        { ch: "新", meaning: "new (第一聲 xīn)", tones: ["xīn", "xín", "xǐn", "xìn"], correctIndex: 0, emoji: "✨" },
        { ch: "忙", meaning: "busy (第二聲 máng)", tones: ["māng", "máng", "mǎng", "màng"], correctIndex: 1, emoji: "💦" },
        { ch: "紅", meaning: "red (第二聲 hóng)", tones: ["hōng", "hóng", "hǒng", "hòng"], correctIndex: 1, emoji: "🍎" },
        { ch: "黑", meaning: "black (第一聲 hēi)", tones: ["hēi", "héi", "hěi", "hèi"], correctIndex: 0, emoji: "🐈‍⬛" },
        { ch: "冷", meaning: "cold (第三聲 lěng)", tones: ["lēng", "léng", "lěng", "lèng"], correctIndex: 2, emoji: "❄️" },
        { ch: "熱", meaning: "hot (第四聲 rè)", tones: ["rē", "ré", "rě", "rè"], correctIndex: 3, emoji: "☀️" },
        { ch: "酸", meaning: "sour (第一聲 suān)", tones: ["suān", "suán", "suǎn", "suàn"], correctIndex: 0, emoji: "🍋" },
        { ch: "貴", meaning: "expensive (第四聲 guì)", tones: ["guī", "guí", "guǐ", "guì"], correctIndex: 3, emoji: "💰" }
    ];

    const level2Data = [
        { ch: "高興", meaning: "happy (gāo xìng)", tones: ["gāo xīng", "gāo xíng", "gāo xǐng", "gāo xìng"], correctIndex: 3, emoji: "😄" },
        { ch: "便宜", meaning: "cheap (pián yí)", tones: ["piān yí", "pián yí", "piǎn yí", "piàn yí"], correctIndex: 1, emoji: "🏷️" },
        { ch: "很好", meaning: "very good (第三聲變調 hén hǎo)", tones: ["hěn hǎo", "hén hǎo", "hèn hǎo", "hēn hǎo"], correctIndex: 1, emoji: "🌟" },
        { ch: "不錯", meaning: "not bad (「不」變調 bú cuò)", tones: ["bù cuò", "bú cuò", "bǔ cuò", "bū cuò"], correctIndex: 1, emoji: "👌" },
        { ch: "好看", meaning: "good-looking (hǎo kàn)", tones: ["hāo kàn", "háo kàn", "hǎo kàn", "hào kàn"], correctIndex: 2, emoji: "👗" },
        { ch: "漂亮", meaning: "pretty (piào liàng)", tones: ["piāo liàng", "piáo liàng", "piǎo liàng", "piào liàng"], correctIndex: 3, emoji: "✨" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let isAnswered = false;
    
    // 遊戲分數系統變數
    let score = 0;
    let currentStreak = 0;
    let maxStreak = 0;
    const BASE_SCORE = 100;

    function startGame(level) {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        currentQuestions = level === 1 ? level1Data : level2Data;
        // 打亂題庫順序，增加重複遊玩的變化性
        currentQuestions.sort(() => Math.random() - 0.5); 
        
        currentIndex = 0;
        score = 0;
        currentStreak = 0;
        maxStreak = 0;
        
        updateScoreUI();
        document.getElementById('level-display').innerText = `Level ${level}`;
        loadQuestion();
    }

    function loadQuestion() {
        isAnswered = false;
        const q = currentQuestions[currentIndex];
        
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('emoji-display').innerText = q.emoji;
        
        document.getElementById('answer-reveal').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";
        
        q.tones.forEach((pinyin, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = pinyin;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function playSound() {
        const q = currentQuestions[currentIndex];
        let utterance = new SpeechSynthesisUtterance(q.ch);
        utterance.lang = "zh-TW";
        utterance.rate = 0.85; 
        speechSynthesis.speak(utterance);
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (isAnswered) return;
        
        const q = currentQuestions[currentIndex];
        
        if (selectedIndex === q.correctIndex) {
            // 答對邏輯：增加連擊與分數
            btnElement.classList.add('correct');
            isAnswered = true;
            
            currentStreak++;
            if (currentStreak > maxStreak) maxStreak = currentStreak;
            
            // 計算分數：基礎分 + 連擊加成 (每多一連擊加 20 分)
            let pointsEarned = BASE_SCORE + (currentStreak > 1 ? (currentStreak - 1) * 20 : 0);
            score += pointsEarned;
            
            showFloatingPoints(pointsEarned);
            updateScoreUI();
            
            document.getElementById('reveal-char').innerText = q.ch;
            document.getElementById('reveal-meaning').innerText = q.meaning;
            document.getElementById('answer-reveal').style.display = "block";
            document.getElementById('next-btn').style.display = "block";
        } else {
            // 答錯邏輯：連擊中斷
            btnElement.classList.add('wrong');
            currentStreak = 0;
            updateScoreUI();
            setTimeout(() => { btnElement.classList.remove('wrong'); }, 400);
        }
    }

    function updateScoreUI() {
        document.getElementById('score').innerText = score;
        const streakIndicator = document.getElementById('streak-indicator');
        
        if (currentStreak > 1) {
            streakIndicator.innerText = `🔥 ${currentStreak} 連擊!`;
            streakIndicator.classList.add('active');
            // 重新觸發動畫
            streakIndicator.style.animation = 'none';
            streakIndicator.offsetHeight; /* trigger reflow */
            streakIndicator.style.animation = null;
        } else {
            streakIndicator.classList.remove('active');
        }
    }

    function showFloatingPoints(points) {
        const visualBox = document.getElementById('visual-box');
        const floatingEl = document.createElement('div');
        floatingEl.className = 'floating-points';
        floatingEl.innerText = `+${points}`;
        
        // 隨機一點出現位置
        const leftPos = 40 + Math.random() * 20; 
        floatingEl.style.left = `${leftPos}%`;
        floatingEl.style.top = '40%';
        
        visualBox.appendChild(floatingEl);
        
        setTimeout(() => { floatingEl.remove(); }, 1000);
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        // 計算評級
        const maxPossibleScore = currentQuestions.length * BASE_SCORE + (currentQuestions.length > 1 ? (currentQuestions.length - 1) * currentQuestions.length / 2 * 20 : 0);
        const scoreRatio = score / maxPossibleScore;
        
        let rankHtml = "";
        if (scoreRatio === 1) {
            rankHtml = `<div class="rank-display rank-S">🏆 S</div><p>完美過關！你的聲調太準了！</p>`;
        } else if (scoreRatio >= 0.8) {
            rankHtml = `<div class="rank-display rank-A">🌟 A</div><p>非常優秀！只差一點點就完美囉。</p>`;
        } else if (scoreRatio >= 0.6) {
            rankHtml = `<div class="rank-display rank-B">👍 B</div><p>表現不錯！繼續保持練習。</p>`;
        } else {
            rankHtml = `<div class="rank-display rank-C">💪 C</div><p>再接再厲！聲調需要多聽多練習喔。</p>`;
        }

        document.getElementById('game-screen').innerHTML = `
            <h2>遊戲結算</h2>
            ${rankHtml}
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left;">
                <p>🏅 總得分：<strong>${score}</strong></p>
                <p>🔥 最高連擊：<strong>${maxStreak}</strong></p>
            </div>
            <button class="action-btn" style="background-color: var(--primary-color);" onclick="location.reload()">再次挑戰 ↺</button>
        `;
    }
</script>

</body>
</html>
