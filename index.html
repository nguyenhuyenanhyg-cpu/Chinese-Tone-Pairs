<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華語聲調大挑戰 - 專業版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

        :root {
            --primary: #FF8F9C;     
            --primary-dark: #E07884;
            --secondary: #6CB4EE;   
            --secondary-dark: #5A99C9;
            --correct: #8ED081;     
            --correct-dark: #76AE6B;
            --wrong: #FF6B6B;       
            --bg-color: #FFF9F0;    
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A;
        }
        
        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFE4E1 15%, transparent 16%), radial-gradient(#FFE4E1 15%, transparent 16%);
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; /* Vừa khít màn hình, không cuộn */
            overflow: hidden;
        }

        /* KHUNG GAME CHÍNH (Chia 2 nửa) */
        .app-container {
            display: flex; gap: 20px; width: 95%; max-width: 1000px; height: 90vh;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; padding: 20px 10px; }
            .app-container { flex-direction: column; height: auto; min-height: 100vh; }
        }

        /* Các khối Panel */
        .panel {
            background-color: var(--card-bg); border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 25px; border: 3px solid #FFF0F5;
            display: flex; flex-direction: column; position: relative;
        }
        .left-panel { flex: 6.5; justify-content: space-between; }
        .right-panel { flex: 3.5; align-items: center; justify-content: center; text-align: center; }

        /* Chuyển cảnh mượt mà */
        .screen { display: none; height: 100%; width: 100%; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tiêu đề & Form */
        h1 { color: var(--primary); margin-bottom: 8px; font-size: 2em; font-weight: 800; line-height: 1.2; }
        p.subtitle { color: #888; margin-bottom: 20px; font-size: 1.05em; font-weight: 700;}
        
        .input-name {
            width: 100%; padding: 14px; font-size: 1.2em; border: 3px solid #E9ECEF;
            border-radius: 16px; margin-bottom: 20px; text-align: center; font-weight: 700; color: var(--text-main);
            outline: none; transition: border-color 0.2s;
        }
        .input-name:focus { border-color: var(--secondary); }

        /* Nút bấm Game */
        .btn {
            background-color: var(--primary); color: white; border: none;
            padding: 14px 20px; border-radius: 16px; font-size: 1.15em; font-weight: 800;
            cursor: pointer; width: 100%; margin-bottom: 12px;
            box-shadow: 0 5px 0 var(--primary-dark); transition: all 0.1s;
        }
        .btn:active { transform: translateY(5px); box-shadow: 0 0 0 var(--primary-dark); }
        .btn.level2 { background-color: var(--secondary); box-shadow: 0 5px 0 var(--secondary-dark); }
        .btn.level2:active { box-shadow: 0 0 0 var(--secondary-dark); }
        .btn-secondary { background-color: #D3D3D3; box-shadow: 0 5px 0 #B0B0B0; color: #555;}
        .btn-secondary:active { box-shadow: 0 0 0 #B0B0B0; }

        /* Khung hiển thị Ảnh từ vựng (Tối ưu không bị cắt) */
        .vocab-image-container {
            width: 100%; flex: 1; min-height: 160px; max-height: 220px; background-color: #F8F9FA;
            border-radius: 16px; margin-bottom: 15px; border: 3px solid #F1F3F5;
            display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 5px;
        }
        .vocab-image { width: 100%; height: 100%; object-fit: contain; display: none; } /* Trọn vẹn ảnh */

        /* Lưới lựa chọn Pinyin */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .option-btn {
            background-color: white; border: 3px solid #E9ECEF; padding: 12px 5px;
            font-size: 1.2em; font-weight: 700; border-radius: 16px; cursor: pointer; 
            color: var(--text-main); transition: all 0.2s; box-shadow: 0 4px 0 #E9ECEF;
        }
        .option-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0 0 #E9ECEF; }
        
        /* Trạng thái nút bấm */
        .option-btn.correct { background-color: var(--correct); border-color: var(--correct-dark); color: white; box-shadow: 0 4px 0 var(--correct-dark); opacity: 1 !important;}
        .option-btn.wrong { background-color: var(--wrong); border-color: #D9534F; color: white; box-shadow: 0 4px 0 #D9534F; animation: shake 0.4s; }
        .option-btn.faded { opacity: 0.3; pointer-events: none; box-shadow: none; transform: translateY(4px); } /* Làm mờ khi sai 2 lần */
        .option-btn.glowing { animation: pulseGlow 1.5s infinite; border-color: var(--correct-dark); background-color: #e8f5e9; color: var(--correct-dark); }

        /* Cảnh báo Sai 2 lần & Đáp án gom vào giữa */
        .answer-reveal-wrapper { display: none; flex-direction: column; margin-bottom: 15px; }
        .answer-reveal-wrapper.active { display: flex; animation: fadeIn 0.3s; }
        
        .warning-banner {
            background-color: #FFF3CD; color: #856404; text-align: center; padding: 6px;
            border-radius: 10px 10px 0 0; font-weight: 800; font-size: 0.9em; border: 2px dashed #FFD700; border-bottom: none;
            display: none; /* Chỉ hiện khi sai 2 lần */
        }
        
        .answer-reveal {
            background-color: #FFF8DC; border: 2px dashed #FFD700;
            padding: 12px 20px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 30px; /* Gom vào giữa */
        }
        .reveal-char { font-size: 3em; color: #D4A017; margin: 0; line-height: 1; font-family: 'Kaiti', 'STKaiti', serif; }
        .reveal-pinyin { font-size: 1.2em; color: #D4A017; font-weight: 800; text-align: center; display: flex; flex-direction: column; }
        .reveal-tone-note { font-size: 0.75em; color: #B8860B; font-weight: 700; margin-top: 2px;}
        .reveal-meaning { font-size: 1.1em; color: #8B6508; font-weight: 700; }

        .nav-buttons { display: flex; gap: 12px; }
        .nav-buttons .btn { margin-bottom: 0; }

        /* --- CỬA SỔ CHÚ CÚN (RIGHT PANEL) --- */
        .pet-image-container {
            width: 220px; height: 220px; background-color: white;
            border-radius: 50%; border: 6px solid #FFE4E1; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .pet-image { width: 100%; height: 100%; object-fit: cover; }
        
        .pet-status { font-weight: 800; color: var(--primary); font-size: 1.2em; min-height: 1.5em; margin-bottom: 10px;}
        .stats-box { background: #F8F9FA; border-radius: 16px; padding: 15px; width: 100%; border: 2px solid #E9ECEF;}
        .stat-line { display: flex; justify-content: space-between; font-weight: 800; color: #555; margin-bottom: 5px; font-size: 1.1em;}
        .stat-val.fire { color: #FFA07A; }
        .stat-val.score { color: var(--secondary-dark); }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 12px; color: #A0A0A0; font-weight: 800; font-size: 1em;}
        
        /* Bảng xếp hạng */
        .leaderboard-list { text-align: left; width: 100%; margin-top: 15px; list-style: none; }
        .leaderboard-list li { background: #F8F9FA; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; font-weight: 700; color: #555; display: flex; justify-content: space-between; }
        .leaderboard-list li.highlight { background: #FFE4E1; color: var(--primary-dark); border: 2px solid var(--primary); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(118, 174, 107, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(118, 174, 107, 0); } 100% { box-shadow: 0 0 0 0 rgba(118, 174, 107, 0); } }
    </style>
</head>
<body>

<div class="app-container">

    <div class="panel left-panel">
        
        <div class="screen active" id="home-screen" style="flex-direction: column; justify-content: center;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h1>華語聲調大挑戰</h1>
                <p class="subtitle">Luyện tập thanh điệu tiếng Trung</p>
            </div>
            <input type="text" id="player-name" class="input-name" placeholder="Nhập tên của bạn..." autocomplete="off">
            <button class="btn" onclick="startGame(1)">Level 1: 單音節</button>
            <button class="btn level2" onclick="startGame(2)">Level 2: 雙音節與變調</button>
        </div>

        <div class="screen" id="game-screen" style="flex-direction: column; height: 100%;">
            <div class="top-bar">
                <span id="level-display" style="background: #F1F3F5; padding: 4px 12px; border-radius: 12px; color: var(--secondary-dark);">Level 1</span>
                <span id="progress-text">1 / 10</span>
            </div>
            
            <div class="vocab-image-container">
                <img id="vocab-img" class="vocab-image" src="" alt="Vocabulary">
            </div>
            
            <button class="btn" style="background-color: var(--correct); box-shadow: 0 5px 0 var(--correct-dark); padding: 10px;" onclick="playSound()">🔊 聽發音 / Nghe lại</button>
            
            <div class="options-grid" id="options-container"></div>
            
            <div class="answer-reveal-wrapper" id="answer-reveal-wrapper">
                <div class="warning-banner" id="warning-banner">連續答錯兩次！這是正確答案 👀</div>
                <div class="answer-reveal">
                    <div class="reveal-char" id="reveal-char">大</div>
                    <div class="reveal-pinyin">
                        <span id="reveal-pinyin-text">dà</span>
                        <span class="reveal-tone-note" id="reveal-tone-note">(Tone 4)</span>
                    </div>
                    <div class="reveal-meaning" id="reveal-meaning">big</div>
                </div>
            </div>
            
            <div class="nav-buttons">
                <button class="btn btn-secondary" onclick="location.reload()">Bỏ cuộc</button>
                <button class="btn" id="next-btn" style="display:none;" onclick="nextQuestion()">下一題 ➔</button>
            </div>
        </div>

        <div class="screen" id="end-screen" style="flex-direction: column; justify-content: center; align-items: center;">
            <h1>Hoàn thành!</h1>
            <p class="subtitle">Kết quả học tập của bạn</p>
            
            <ul class="leaderboard-list" id="leaderboard-list">
                </ul>

            <button class="btn" style="margin-top: 20px;" onclick="location.reload()">Chơi lại từ đầu ↺</button>
        </div>
    </div>

    <div class="panel right-panel">
        <div class="pet-image-container">
            <img id="pet-img" class="pet-image" src="assets/dog_idle.gif" alt="Puppy NPC" onerror="this.src='https://via.placeholder.com/220/FFE4E1/FF8F9C?text=Pet+GIF'">
        </div>
        <div class="pet-status" id="pet-status">Xin chào! Cùng học nhé!</div>
        
        <div class="stats-box">
            <div class="stat-line"><span>Điểm số:</span> <span class="stat-val score" id="score-display">0</span></div>
            <div class="stat-line"><span>Liên kích:</span> <span class="stat-val fire" id="streak-display">0</span></div>
        </div>
    </div>

</div>

<script>
    // 📚 DATA TỪ VỰNG (LEVEL 1 & LEVEL 2)
    const level1Data = [
        { ch: "大", meaning: "big", pinyin: "dà", tones: ["dā", "dá", "dǎ", "dà"], correct: 3, toneNote: "Tone 4", imgFile: "da.jpg" },
        { ch: "小", meaning: "small", pinyin: "xiǎo", tones: ["xiāo", "xiáo", "xiǎo", "xiào"], correct: 2, toneNote: "Tone 3", imgFile: "xiao.jpg" },
        { ch: "好", meaning: "good", pinyin: "hǎo", tones: ["hāo", "háo", "hǎo", "hào"], correct: 2, toneNote: "Tone 3", imgFile: "hao.jpg" },
        { ch: "新", meaning: "new", pinyin: "xīn", tones: ["xīn", "xín", "xǐn", "xìn"], correct: 0, toneNote: "Tone 1", imgFile: "xin.jpg" },
        { ch: "忙", meaning: "busy", pinyin: "máng", tones: ["māng", "máng", "mǎng", "màng"], correct: 1, toneNote: "Tone 2", imgFile: "mang.jpg" },
        { ch: "紅", meaning: "red", pinyin: "hóng", tones: ["hōng", "hóng", "hǒng", "hòng"], correct: 1, toneNote: "Tone 2", imgFile: "hong.jpg" },
        { ch: "黑", meaning: "black", pinyin: "hēi", tones: ["hēi", "héi", "hěi", "hèi"], correct: 0, toneNote: "Tone 1", imgFile: "hei.jpg" },
        { ch: "冷", meaning: "cold", pinyin: "lěng", tones: ["lēng", "léng", "lěng", "lèng"], correct: 2, toneNote: "Tone 3", imgFile: "leng.jpg" },
        { ch: "熱", meaning: "hot", pinyin: "rè", tones: ["rē", "ré", "rě", "rè"], correct: 3, toneNote: "Tone 4", imgFile: "re.jpg" },
        { ch: "酸", meaning: "sour", pinyin: "suān", tones: ["suān", "suán", "suǎn", "suàn"], correct: 0, toneNote: "Tone 1", imgFile: "suan.jpg" },
        { ch: "貴", meaning: "expensive", pinyin: "guì", tones: ["guī", "guí", "guǐ", "guì"], correct: 3, toneNote: "Tone 4", imgFile: "gui.jpg" }
    ];

    const level2Data = [
        { ch: "高興", meaning: "happy", pinyin: "gāo xìng", tones: ["gāo xīng", "gāo xíng", "gāo xǐng", "gāo xìng"], correct: 3, toneNote: "Tone 1 + 4", imgFile: "gaoxing.jpg" },
        { ch: "便宜", meaning: "cheap", pinyin: "pián yí", tones: ["piān yí", "pián yí", "piǎn yí", "piàn yí"], correct: 1, toneNote: "Tone 2 + 2", imgFile: "pianyi.jpg" },
        { ch: "很好", meaning: "very good", pinyin: "hěn hǎo", tones: ["hěn hǎo", "hén hǎo", "hèn hǎo", "hēn hǎo"], correct: 0, toneNote: "Tone 3 + 3 (Biến điệu)", imgFile: "henhao.jpg" },
        { ch: "不錯", meaning: "not bad", pinyin: "bú cuò", tones: ["bù cuò", "bú cuò", "bǔ cuò", "bū cuò"], correct: 1, toneNote: "Tone 4 -> 2 + 4", imgFile: "bucuo.jpg" },
        { ch: "好看", meaning: "good-looking", pinyin: "hǎo kàn", tones: ["hāo kàn", "háo kàn", "hǎo kàn", "hào kàn"], correct: 2, toneNote: "Tone 3 + 4", imgFile: "haokan.jpg" },
        { ch: "漂亮", meaning: "pretty", pinyin: "piào liàng", tones: ["piāo liàng", "piáo liàng", "piǎo liàng", "piào liàng"], correct: 3, toneNote: "Tone 4 + 4", imgFile: "piaoliang.jpg" },
        { ch: "難聽", meaning: "awful (sound)", pinyin: "nán tīng", tones: ["nān tīng", "nán tīng", "nǎn tīng", "nàn tīng"], correct: 1, toneNote: "Tone 2 + 1", imgFile: "nanting.jpg" },
        { ch: "突然", meaning: "sudden", pinyin: "tú rán", tones: ["tū rán", "tú rán", "tǔ rán", "tù rán"], correct: 1, toneNote: "Tone 2 + 2", imgFile: "turan.jpg" },
        { ch: "無聊", meaning: "boring", pinyin: "wú liáo", tones: ["wū liáo", "wú liáo", "wǔ liáo", "wù liáo"], correct: 1, toneNote: "Tone 2 + 2", imgFile: "wuliao.jpg" },
        { ch: "危險", meaning: "dangerous", pinyin: "wēi xiǎn", tones: ["wēi xiǎn", "wéi xiǎn", "wěi xiǎn", "wèi xiǎn"], correct: 0, toneNote: "Tone 1 + 3", imgFile: "weixian.jpg" },
        { ch: "糟糕", meaning: "terrible", pinyin: "zāo gāo", tones: ["zāo gāo", "záo gāo", "zǎo gāo", "zào gāo"], correct: 0, toneNote: "Tone 1 + 1", imgFile: "zaogao.jpg" }
    ];

    let playerName = "Người chơi Ẩn danh";
    let currentQuestions = [];
    let currentIndex = 0;
    let wrongAttempts = 0; 
    let streak = 0;
    let score = 0;
    let isLocked = false;
    let currentLevelName = "";

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(level) {
        const nameInput = document.getElementById('player-name').value.trim();
        if(nameInput !== "") playerName = nameInput;

        currentLevelName = level === 1 ? "Level 1" : "Level 2";
        currentQuestions = level === 1 ? [...level1Data] : [...level2Data];
        currentQuestions.sort(() => Math.random() - 0.5); 
        
        currentIndex = 0; streak = 0; score = 0;
        document.getElementById('level-display').innerText = currentLevelName;
        
        switchScreen('game-screen');
        loadQuestion();
    }

    function loadQuestion() {
        isLocked = false; wrongAttempts = 0;
        const q = currentQuestions[currentIndex];
        
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
        document.getElementById('answer-reveal-wrapper').classList.remove('active');
        document.getElementById('warning-banner').style.display = "none";
        document.getElementById('next-btn').style.display = "none";
        
        // Tải ảnh (object-fit: contain tự động xử lý cắt viền)
        const vocabImg = document.getElementById('vocab-img');
        vocabImg.src = `assets/${q.imgFile}`;
        vocabImg.style.display = 'block';

        updatePetState('idle');

        // Tạo nút chọn Pinyin
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";
        q.tones.forEach((pinyin, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = pinyin;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });

        playSound();
    }

    function playSound() {
        const q = currentQuestions[currentIndex];
        let utterance = new SpeechSynthesisUtterance(q.ch);
        utterance.lang = "zh-TW";
        utterance.rate = 0.85; 
        speechSynthesis.speak(utterance);
    }

    function updatePetState(state) {
        const petImg = document.getElementById('pet-img');
        const petStatus = document.getElementById('pet-status');
        
        if (state === 'idle') {
            petImg.src = "assets/dog_idle.gif";
            petStatus.innerText = "Cún đang nghe...";
            petStatus.style.color = "var(--text-main)";
        } else if (state === 'happy') {
            petImg.src = "assets/dog_happy.gif";
            petStatus.innerText = "Đúng rồi! Ngon quá!";
            petStatus.style.color = "var(--correct-dark)";
        } else if (state === 'sad') {
            petImg.src = "assets/dog_sad.gif";
            petStatus.innerText = "Sai rồi... cún đói...";
            petStatus.style.color = "var(--secondary-dark)";
        } else if (state === 'cry') {
            petImg.src = "assets/dog_cry.gif";
            petStatus.innerText = "Huhu khó quá!";
            petStatus.style.color = "var(--wrong)";
        }
        document.getElementById('streak-display').innerText = streak;
        document.getElementById('score-display').innerText = score;
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (isLocked) return;
        const q = currentQuestions[currentIndex];
        const buttons = document.querySelectorAll('.option-btn');
        
        if (selectedIndex === q.correct) {
            btnElement.classList.add('correct');
            streak++;
            score += (100 + streak * 10); // Tính điểm có bonus combo
            isLocked = true;
            updatePetState('happy');
            showAnswerReveal(q, false);
        } else {
            wrongAttempts++;
            streak = 0;
            btnElement.classList.add('wrong');
            setTimeout(() => { btnElement.classList.remove('wrong'); }, 400); 
            btnElement.disabled = true;

            if (wrongAttempts === 1) {
                updatePetState('sad');
            } else if (wrongAttempts >= 2) {
                isLocked = true;
                updatePetState('cry');
                
                // HIỆU ỨNG SAI 2 LẦN: Làm mờ tất cả, Nhấp nháy đáp án đúng
                buttons.forEach((btn, idx) => {
                    if (idx !== q.correct) btn.classList.add('faded');
                    else btn.classList.add('glowing');
                });
                
                showAnswerReveal(q, true);
            }
        }
    }

    function showAnswerReveal(q, isWarning) {
        document.getElementById('reveal-char').innerText = q.ch;
        document.getElementById('reveal-pinyin-text').innerText = q.pinyin;
        document.getElementById('reveal-tone-note').innerText = `(${q.toneNote})`;
        document.getElementById('reveal-meaning').innerText = q.meaning;
        
        // Hiện cảnh báo đỏ nếu sai 2 lần
        document.getElementById('warning-banner').style.display = isWarning ? "block" : "none";
        
        // Hiện khung đáp án (nhưng xóa border trên nếu có banner để trông liền mạch)
        const revealBox = document.querySelector('.answer-reveal');
        revealBox.style.borderRadius = isWarning ? "0 0 12px 12px" : "12px";
        revealBox.style.borderTop = isWarning ? "none" : "2px dashed #FFD700";

        document.getElementById('answer-reveal-wrapper').classList.add('active');
        document.getElementById('next-btn').style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            loadQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        switchScreen('end-screen');
        updatePetState('happy');
        document.getElementById('pet-status').innerText = "Tuyệt vời! Cún no rồi!";
        saveLeaderboard();
    }

    function saveLeaderboard() {
        let lb = JSON.parse(localStorage.getItem('puppyToneLeaderboard')) || [];
        lb.push({ name: playerName, score: score, level: currentLevelName });
        lb.sort((a, b) => b.score - a.score);
        lb = lb.slice(0, 5); // Lưu top 5
        localStorage.setItem('puppyToneLeaderboard', JSON.stringify(lb));
        
        const listEl = document.getElementById('leaderboard-list');
        listEl.innerHTML = "";
        lb.forEach((entry, idx) => {
            const li = document.createElement('li');
            if (entry.name === playerName && entry.score === score) li.classList.add('highlight');
            li.innerHTML = `<span>#${idx+1} ${entry.name} [${entry.level}]</span> <span>${entry.score} pts</span>`;
            listEl.appendChild(li);
        });
    }
</script>

</body>
</html>
